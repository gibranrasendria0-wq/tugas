<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Cuaca</title>
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> -->
    <link rel="stylesheet" href="style.css">
   
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Cuaca Hari Ini</h1>
            <p>Cari cuaca di kota mana saja</p>
        </div>

        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Masukkan nama kota..."
                autocomplete="off"
            >
            <button id="searchBtn">Cari</button>
        </div>

        <div class="error" id="error"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Mengambil data cuaca...</p>
        </div>

        <div class="weather-card hidden" id="weatherCard">
            <div class="location">
                <h2 id="locationName">-</h2>
                <p id="updateTime">-</p>
            </div>

            <div class="main-weather">
                <div class="weather-icon" id="weatherIcon">🌤️</div>
                <div class="weather-info">
                    <div class="temperature" id="temperature">-°C</div>
                    <div class="weather-desc" id="weatherDesc">-</div>
                </div>
            </div>

            <div class="weather-details">
                <div class="detail-item">
                    <div class="detail-label">Terasa Seperti</div>
                    <div class="detail-value" id="feelsLike">-°C</div>
                </div>

                <div class="detail-item">
                    <div class="detail-label">Kelembaban</div>
                    <div class="detail-value" id="humidity">-%</div>
                </div>

                <div class="detail-item">
                    <div class="detail-label">Kecepatan Angin</div>
                    <div class="detail-value" id="windSpeed">-</div>
                </div>

                <div class="detail-item">
                    <div class="detail-label">Tekanan</div>
                    <div class="detail-value" id="pressure">-</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Data cuaca dari Open-Meteo</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
