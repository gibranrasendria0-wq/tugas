<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Cuaca</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* background: linear-gradient(135deg, #000000 0%, #fcf8ff 100%); */
            background-image: url(pemandanganJepang.jpg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
      
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .search-box input:focus {
            outline: none;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .search-box input::placeholder {
            color: #999;
        }

        .search-box button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: white;
            color: #000000;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .search-box button:active {
            transform: translateY(0);
        }

        .weather-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            color: white;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }

        .error.active {
            display: block;
        }

         @keyframes slideIn { /*@keyframes adalah aturan di CSS yang digunakan untuk membuat animasi. Dengan @keyframes, kita menentukan perubahan suatu elemen dari keadaan awal hingga keadaan akhir */
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .location {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .location h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 5px;
        }

        .location p {
            font-size: 13px;
            color: #999;
        }

        .main-weather {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid #eee;
        }

        .weather-icon {
            font-size: 80px;
            color: #667eea;
        }

        .weather-info {
            flex: 1;
            text-align: right;
        }

        .temperature {
            font-size: 56px;
            font-weight: 700;
            color: #333;
            line-height: 1;
            margin-bottom: 8px;
        }

        .weather-desc {
            font-size: 16px;
            color: #666;
            font-weight: 500;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .detail-item {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .detail-item:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, #667eea25 0%, #764ba225 100%);
        }

        .detail-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .detail-value {
            font-size: 24px;
            font-weight: 700;
            color: #000000;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 28px;
            }

            .weather-card {
                padding: 20px;
            }

            .main-weather {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .weather-info {
                text-align: center;
            }

            .temperature {
                font-size: 48px;
            }

            .weather-icon {
                font-size: 60px;
            }

            .search-box {
                flex-direction: column;
            }

            .search-box button {
                width: 100%;
            }
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Cuaca Hari Ini</h1>
            <p>Cari cuaca di kota mana saja</p>
        </div>

        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Masukkan nama kota..."
                autocomplete="off"
            >
            <button id="searchBtn">Cari</button>
        </div>

        <div class="error" id="error"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Mengambil data cuaca...</p>
        </div>

        <div class="weather-card hidden" id="weatherCard">
            <div class="location">
                <h2 id="locationName">-</h2>
                <p id="updateTime">-</p>
            </div>

            <div class="main-weather">
                <div class="weather-icon" id="weatherIcon">🌤️</div>
                <div class="weather-info">
                    <div class="temperature" id="temperature">-°C</div>
                    <div class="weather-desc" id="weatherDesc">-</div>
                </div>
            </div>

            <div class="weather-details">
                <div class="detail-item">
                    <div class="detail-label">Terasa Seperti</div>
                    <div class="detail-value" id="feelsLike">-°C</div>
                </div>

                <div class="detail-item">
                    <div class="detail-label">Kelembaban</div>
                    <div class="detail-value" id="humidity">-%</div>
                </div>

                <div class="detail-item">
                    <div class="detail-label">Kecepatan Angin</div>
                    <div class="detail-value" id="windSpeed">-</div>
                </div>

                <div class="detail-item">
                    <div class="detail-label">Tekanan</div>
                    <div class="detail-value" id="pressure">-</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Data cuaca dari Open-Meteo</p>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const weatherCard = document.getElementById('weatherCard');

        const locationName = document.getElementById('locationName');
        const updateTime = document.getElementById('updateTime');
        const temperature = document.getElementById('temperature');
        const weatherDesc = document.getElementById('weatherDesc');
        const weatherIcon = document.getElementById('weatherIcon');
        const feelsLike = document.getElementById('feelsLike');
        const humidity = document.getElementById('humidity');
        const windSpeed = document.getElementById('windSpeed');
        const pressure = document.getElementById('pressure');

        // Weather code to icon dan deskripsi
        const weatherCodes = {
            0: { icon: '☀️', desc: 'Cerah' },
            1: { icon: '🌤️', desc: 'Sebagian Berawan' },
            2: { icon: '⛅', desc: 'Sebagian Berawan' },
            3: { icon: '☁️', desc: 'Berawan' },
            45: { icon: '🌫️', desc: 'Kabut' },
            48: { icon: '🌫️', desc: 'Kabut' },
            51: { icon: '🌦️', desc: 'Gerimis Ringan' },
            53: { icon: '🌧️', desc: 'Gerimis Sedang' },
            55: { icon: '🌧️', desc: 'Gerimis Berat' },
            61: { icon: '🌧️', desc: 'Hujan Ringan' },
            63: { icon: '🌧️', desc: 'Hujan Sedang' },
            65: { icon: '⛈️', desc: 'Hujan Berat' },
            71: { icon: '❄️', desc: 'Salju Ringan' },
            73: { icon: '❄️', desc: 'Salju Sedang' },
            75: { icon: '❄️', desc: 'Salju Berat' },
            77: { icon: '❄️', desc: 'Salju' },
            80: { icon: '🌧️', desc: 'Hujan Ringan' },
            81: { icon: '⛈️', desc: 'Hujan Sedang' },
            82: { icon: '⛈️', desc: 'Hujan Berat' },
            85: { icon: '❄️', desc: 'Salju Lebat' },
            86: { icon: '❄️', desc: 'Salju Lebat' },
            95: { icon: '⛈️', desc: 'Badai Petir' },
            96: { icon: '⛈️', desc: 'Badai Petir Berat' },
            99: { icon: '⛈️', desc: 'Badai Petir Ekstrem' }
        };

        async function fetchWeather(city) {
            if (!city.trim()) {
                showError('Masukkan nama kota!');
                return;
            }

            hideError();
            showLoading();
            hideWeatherCard();

            try {
                // Cari koordinat kota
                const geoResponse = await fetch(
                    `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`
                );
                const geoData = await geoResponse.json();

                if (!geoData.results || geoData.results.length === 0) {
                    showError('Kota tidak ditemukan. Coba lagi!');
                    hideLoading();
                    return;
                }

                const { latitude, longitude, name, country } = geoData.results[0];

                // Ambil data cuaca
                const weatherResponse = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,apparent_temperature,pressure_msl&temperature_unit=celsius&wind_speed_unit=kmh&timezone=auto`
                );
                const weatherData = await weatherResponse.json();
                const current = weatherData.current;

                // Update UI
                locationName.textContent = `${name}, ${country}`;
                updateTime.textContent = new Date().toLocaleString('id-ID', {
                    hour: '2-digit',
                    minute: '2-digit',
                    day: 'numeric',
                    month: 'long'
                });

                const temp = Math.round(current.temperature_2m);
                temperature.textContent = `${temp}°C`;
                feelsLike.textContent = `${Math.round(current.apparent_temperature)}°C`;
                humidity.textContent = `${current.relative_humidity_2m}%`;
                windSpeed.textContent = `${Math.round(current.wind_speed_10m)} km/h`;
                pressure.textContent = `${Math.round(current.pressure_msl)} mb`;

                const weatherInfo = weatherCodes[current.weather_code] || {
                    icon: '🌤️',
                    desc: 'Tidak Diketahui'
                };
                weatherIcon.textContent = weatherInfo.icon;
                weatherDesc.textContent = weatherInfo.desc;

                hideLoading();
                showWeatherCard();
            } catch (err) {
                console.error(err);
                showError('Gagal mengambil data. Periksa koneksi Anda!');
                hideLoading();
            }
        }

        function showLoading() {
            loading.classList.add('active');
        }

        function hideLoading() {
            loading.classList.remove('active');
        }

        function showWeatherCard() {
            weatherCard.classList.remove('hidden');
        }

        function hideWeatherCard() {
            weatherCard.classList.add('hidden');
        }

        function showError(message) {
            error.textContent = message;
            error.classList.add('active');
        }

        function hideError() {
            error.classList.remove('active');
        }

        // Event listeners
        searchBtn.addEventListener('click', () => {
            fetchWeather(searchInput.value);
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                fetchWeather(searchInput.value);
            }
        });

        // Load cuaca Sidoarjo saat pertama kali
        window.addEventListener('load', () => {
            fetchWeather('Sidoarjo');
            searchInput.value = '';
        });
    </script>
</body>
</html>
